name: Deploy Tokens to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'packages/tokens/src/**'
      - 'packages/components/src/**'
      - 'packages/sync-server/**'
      - 'packages/figma-plugin/**'
      - 'demo/**'
      - 'projects/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build static token files for all projects
        run: |
          for dir in projects/*/; do
            proj=$(basename "$dir")
            echo "Building project: $proj"
            node packages/sync-server/build-static.js --project "$proj" --out-dir ./dist
          done

      - name: Audit token drift (editor source ↔ dist mirror)
        # Fails the deploy if build-static.js mutated any
        # projects/<id>/*.css (which would clobber editor saves) or
        # if a project's dist mirror disagrees with the editor truth.
        # Re-runs the build internally, so it also catches non-
        # determinism between the two build invocations.
        run: node scripts/audit-token-drift.cjs

      - name: Copy plugin UI to root
        run: |
          mkdir -p dist/plugin
          cp demo/plugin/ui.html dist/plugin/ui.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
